<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Circuits — Sirkuit Getayangan</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300;400;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #08080a;
    --paper: #f0ebe0;
    --acid: #c8ff00;
    --rust: #c94a1e;
    --cold: #00c8c8;
    --dim: rgba(240,235,224,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Josefin Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    position: relative;
  }

  /* ── Cursor ── */
  .cursor {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--acid);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: exclusion;
    transition: width .15s, height .15s, transform .15s;
  }
  .cursor.big {
    width: 40px; height: 40px;
    transform: translate(-17px, -17px);
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--acid);
    mix-blend-mode: normal;
  }

  /* ── Noise + scanlines ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.5;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 6px);
    pointer-events: none; z-index: 999;
  }

  /* ── Ambient glows ── */
  .glow-1 {
    position: fixed;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(200,255,0,0.04) 0%, transparent 65%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: breathe 8s ease-in-out infinite;
  }
  .glow-2 {
    position: fixed;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(201,74,30,0.03) 0%, transparent 65%);
    bottom: 10%; right: 15%;
    pointer-events: none;
    animation: breathe 11s ease-in-out infinite reverse;
  }
  @keyframes breathe {
    0%,100% { opacity:.5; transform: translate(-50%,-50%) scale(1); }
    50% { opacity:1; transform: translate(-50%,-50%) scale(1.15); }
  }
  .glow-2 { transform: none; }
  .glow-2:is(:hover) { transform: none; }
  @keyframes breathe2 {
    0%,100% { opacity:.5; transform:scale(1); }
    50% { opacity:1; transform:scale(1.2); }
  }

  /* ── Moving scan line ── */
  .scanbar {
    position: fixed; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, rgba(200,255,0,0.08), transparent);
    pointer-events: none; z-index: 998;
    animation: scan 10s linear infinite;
  }
  @keyframes scan { from{top:-2px} to{top:100%} }

  /* ── Corner brackets ── */
  .corner {
    position: fixed;
    width: 28px; height: 28px;
    border-color: rgba(200,255,0,0.15);
    border-style: solid;
    pointer-events: none;
  }
  .c-tl { top:28px; left:28px; border-width:1px 0 0 1px; }
  .c-tr { top:28px; right:28px; border-width:1px 1px 0 0; }
  .c-bl { bottom:28px; left:28px; border-width:0 0 1px 1px; }
  .c-br { bottom:28px; right:28px; border-width:0 1px 1px 0; }

  /* ── Site label top ── */
  .site-label {
    position: fixed;
    top: 32px; left: 50%; transform: translateX(-50%);
    font-weight: 100;
    font-size: 8px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(200,255,0,0.4);
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.5s;
  }

  /* ── Status bottom ── */
  .status-bar {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 24px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.8s;
    pointer-events: none;
  }
  .status-bar span {
    font-weight: 100;
    font-size: 7px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.2);
  }
  .status-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(200,255,0,0.3);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* ══════════════════════════════
     BOOK COVER — the hero element
  ══════════════════════════════ */
  .book-wrap {
    position: relative;
    opacity: 0;
    animation: bookReveal 2s cubic-bezier(0.16,1,0.3,1) forwards 0.4s;
    perspective: 1000px;
  }

  @keyframes bookReveal {
    0%  { opacity:0; transform: translateY(60px) rotateX(15deg) scale(0.92); }
    100%{ opacity:1; transform: translateY(0) rotateX(0deg) scale(1); }
  }

  .book {
    width: 280px;
    aspect-ratio: 2/3;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.06s linear;
    /* subtle 3d shadow stack */
    filter: drop-shadow(0 40px 60px rgba(0,0,0,0.9)) drop-shadow(0 0 60px rgba(200,255,0,0.04));
  }

  /* Page depth illusion on right edge */
  .book::before {
    content: '';
    position: absolute;
    top: 2px; right: -6px; bottom: 2px;
    width: 6px;
    background: linear-gradient(to right, #1a1a1a, #0d0d0d);
    transform: skewY(0deg);
    border-radius: 0 2px 2px 0;
  }

  /* Bottom depth */
  .book::after {
    content: '';
    position: absolute;
    bottom: -6px; left: 2px; right: -4px;
    height: 6px;
    background: linear-gradient(to bottom, #111, #0a0a0a);
    border-radius: 0 0 2px 2px;
  }

  .book-face {
    width: 100%; height: 100%;
    background: var(--ink);
    border: 1px solid rgba(200,255,0,0.12);
    overflow: hidden;
    position: relative;
    transition: border-color 0.4s;
  }

  .book:hover .book-face {
    border-color: rgba(200,255,0,0.3);
  }

  /* Circuit grid texture on cover */
  .book-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(200,255,0,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,0,1) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.04;
  }

  /* Ambient gradient on cover */
  .book-ambient {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 40% 25%, rgba(200,255,0,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(201,74,30,0.07) 0%, transparent 50%);
  }

  /* Glitch bars */
  .glitch-bar {
    position: absolute; left:0; right:0; height:1px;
    opacity: 0;
  }
  .glitch-bar.g1 { top:33%; background:var(--acid); animation: gbar 9s 1s infinite; }
  .glitch-bar.g2 { top:67%; background:var(--rust); animation: gbar 7s 3.5s infinite; }
  @keyframes gbar {
    0%,85%,100%{ opacity:0; transform:scaleX(0); }
    86%{ opacity:.5; transform:scaleX(1); }
    87%{ opacity:0; transform:scaleX(.4); }
    88%{ opacity:.3; transform:scaleX(1); }
    90%{ opacity:0; }
  }

  /* Content layout inside cover */
  .book-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 28px 24px;
  }

  .book-tag {
    font-weight: 100;
    font-size: 7px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(200,255,0,0.6);
  }

  /* Big central symbol */
  .book-symbol {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .psi {
    font-family: 'Libre Baskerville', serif;
    font-size: 110px;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(200,255,0,0.2);
    user-select: none;
    position: relative;
    animation: psi-breathe 5s ease-in-out infinite;
  }
  .psi::after {
    content: 'ψ';
    position: absolute; left:3px; top:3px;
    color: transparent;
    -webkit-text-stroke: 1px rgba(201,74,30,0.15);
  }
  @keyframes psi-breathe {
    0%,100%{ opacity:.5; } 50%{ opacity:1; }
  }

  /* Circuit lines decorating the symbol area */
  .circuit-lines {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .circuit-lines svg {
    width: 100%; height: 100%;
    opacity: 0.12;
  }

  /* Bottom text */
  .book-bottom { }

  .book-title {
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper);
    line-height: 1;
    position: relative;
    margin-bottom: 4px;
  }
  .book-title::after {
    content: 'GHOST CIRCUITS';
    position: absolute; left:2px; top:2px;
    color: var(--rust);
    opacity: 0.25;
    z-index: -1;
  }

  .book-subtitle {
    font-weight: 100;
    font-size: 7px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.3);
    margin-bottom: 18px;
  }

  .book-footer-line {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 12px;
    border-top: 1px solid rgba(200,255,0,0.08);
  }

  .book-status {
    font-weight: 100;
    font-size: 6px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(200,255,0,0.4);
    flex: 1;
  }

  .book-chapters {
    font-weight: 100;
    font-size: 6px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.2);
  }

  /* ── Hover overlay: "BACA" CTA ── */
  .book-cta {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(8,8,10,0.85);
    opacity: 0;
    transition: opacity 0.35s ease;
    z-index: 10;
    backdrop-filter: blur(2px);
  }

  .book:hover .book-cta { opacity: 1; }

  .cta-label {
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.6em;
    text-transform: uppercase;
    color: var(--acid);
    position: relative;
  }
  .cta-label::before {
    content: '';
    position: absolute;
    bottom: -6px; left: 0; right: 0;
    height: 1px;
    background: var(--acid);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease 0.1s;
  }
  .book:hover .cta-label::before { transform: scaleX(1); }

  .cta-arrow {
    font-size: 20px;
    color: rgba(200,255,0,0.5);
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(6px); }
  }

  /* ── Title block beside/below the book ── */
  .title-block {
    position: fixed;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2s;
    pointer-events: none;
  }

  .title-main {
    font-weight: 100;
    font-size: 10px;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.18);
    margin-bottom: 4px;
  }

  .title-sub {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-size: 11px;
    color: rgba(240,235,224,0.1);
    letter-spacing: 0.1em;
  }

  @keyframes fadeIn {
    from{ opacity:0; transform: translateX(-50%) translateY(8px); }
    to{ opacity:1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .book { width: 220px; }
    .psi { font-size: 80px; }
    .book-title { font-size: 20px; }
    .corner { display: none; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="glow-1"></div>
<div class="glow-2"></div>
<div class="scanbar"></div>

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<span class="site-label">Ghost Circuits — Sirkuit Getayangan</span>

<!-- ═══ BOOK COVER ═══ -->
<div class="book-wrap">
  <div class="book" id="book" onclick="window.location.href='chapters.html'">

    <div class="book-face">
      <div class="book-grid"></div>
      <div class="book-ambient"></div>
      <div class="glitch-bar g1"></div>
      <div class="glitch-bar g2"></div>

      <!-- Hover CTA -->
      <div class="book-cta">
        <span class="cta-label">Baca Novel</span>
        <span class="cta-arrow">↓</span>
      </div>

      <div class="book-content">
        <span class="book-tag">Dark Urban Fantasy · Jakarta 2026</span>

        <div class="book-symbol">
          <div class="circuit-lines">
            <svg viewBox="0 0 280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Horizontal lines -->
              <line x1="0" y1="100" x2="80" y2="100" stroke="#c8ff00" stroke-width="0.5"/>
              <line x1="200" y1="100" x2="280" y2="100" stroke="#c8ff00" stroke-width="0.5"/>
              <line x1="0" y1="320" x2="70" y2="320" stroke="#c8ff00" stroke-width="0.5"/>
              <line x1="210" y1="320" x2="280" y2="320" stroke="#c8ff00" stroke-width="0.5"/>
              <!-- Vertical lines -->
              <line x1="60" y1="0" x2="60" y2="90" stroke="#c8ff00" stroke-width="0.5"/>
              <line x1="60" y1="110" x2="60" y2="200" stroke="#c8ff00" stroke-width="0.5"/>
              <line x1="220" y1="0" x2="220" y2="90" stroke="#c8ff00" stroke-width="0.5"/>
              <line x1="60" y1="310" x2="60" y2="420" stroke="#c8ff00" stroke-width="0.5"/>
              <line x1="220" y1="330" x2="220" y2="420" stroke="#c8ff00" stroke-width="0.5"/>
              <!-- Corner dots -->
              <circle cx="60" cy="100" r="2" fill="#c8ff00"/>
              <circle cx="220" cy="100" r="2" fill="#c8ff00"/>
              <circle cx="60" cy="320" r="2" fill="#c8ff00"/>
              <circle cx="220" cy="320" r="2" fill="#c8ff00"/>
              <!-- Rust accent -->
              <line x1="100" y1="200" x2="180" y2="200" stroke="#c94a1e" stroke-width="0.5" stroke-dasharray="4 4"/>
              <circle cx="140" cy="200" r="3" stroke="#c94a1e" stroke-width="0.5"/>
            </svg>
          </div>
          <span class="psi">ψ</span>
        </div>

        <div class="book-bottom">
          <div class="book-title">Ghost Circuits</div>
          <div class="book-subtitle">Sirkuit Getayangan</div>
          <div class="book-footer-line">
            <span class="book-status">● Tamat</span>
            <span class="book-chapters">Prolog + 4 Babak</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- subtle title below -->
<div class="title-block">
  <div class="title-main">Novel Indonesia · Klik untuk membaca</div>
  <div class="title-sub">Dark Urban Fantasy</div>
</div>

<div class="status-bar">
  <span>Status</span>
  <div class="status-dot"></div>
  <span>Tamat · 2026</span>
</div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = (e.clientX - 3) + 'px';
    cursor.style.top  = (e.clientY - 3) + 'px';
  });
  const book = document.getElementById('book');
  book.addEventListener('mouseenter', () => cursor.classList.add('big'));
  book.addEventListener('mouseleave', () => cursor.classList.remove('big'));

  // 3D tilt on hover
  book.addEventListener('mousemove', e => {
    const r = book.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    book.style.transform = `rotateY(${x * 14}deg) rotateX(${-y * 10}deg) scale(1.03)`;
  });
  book.addEventListener('mouseleave', () => {
    book.style.transform = '';
  });
</script>
</body>
</html>
